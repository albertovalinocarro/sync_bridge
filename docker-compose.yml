services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: syncbridge_php
    volumes:
      - ./app:/var/www/app
    working_dir: /var/www/app
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: syncbridge_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: syncbridge_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: syncbridge
      MYSQL_USER: syncbridge
      MYSQL_PASSWORD: syncbridge
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: syncbridge_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
